name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    # Variables configurables (bucket/distribution) y credenciales (no hardcodeadas).
    env:
      # Credenciales para AWS (defínelas como Secrets en GitHub).
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Región (recomendado como GitHub Variable "vars.AWS_REGION").
      AWS_REGION: ${{ vars.AWS_REGION }}

      # Objetivo de despliegue (recomendado como GitHub Variables).
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      # 1) Checkout del código.
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Usar Node 18+ (en este caso, 20).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Cachea la descarga de dependencias para mejorar performance.
          cache: "npm"
          cache-dependency-path: package-lock.json

      # 3) (Opcional) Cachear node_modules para acelerar el workflow.
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-
            ${{ runner.os }}-node-

      # 4) Validar que la configuración mínima exista antes de desplegar.
      - name: Validate required environment variables
        run: |
          set -euo pipefail

          if [ -z "${S3_BUCKET_NAME}" ]; then
            echo "Error: S3_BUCKET_NAME está vacío. Define vars.S3_BUCKET_NAME en GitHub."
            exit 1
          fi

          if [ -z "${CLOUDFRONT_DISTRIBUTION_ID}" ]; then
            echo "Error: CLOUDFRONT_DISTRIBUTION_ID está vacío. Define vars.CLOUDFRONT_DISTRIBUTION_ID en GitHub."
            exit 1
          fi

          if [ -z "${AWS_REGION}" ]; then
            echo "Error: AWS_REGION está vacío. Define vars.AWS_REGION en GitHub."
            exit 1
          fi

          if [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "Error: Faltan AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY. Define estos como Secrets en GitHub."
            exit 1
          fi

      # 5) Configurar credenciales AWS (action oficial).
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 6) Instalar dependencias (npm ci para reproducibilidad).
      - name: Install dependencies
        working-directory: .
        run: npm ci

      # 7) Construir el frontend (si falla, el workflow se detiene).
      - name: Build
        working-directory: .
        run: npm run build

      # 8) Detectar automáticamente la carpeta de salida: dist/ (Vite) o build/ (React).
      - name: Detect build output directory
        id: output
        working-directory: .
        run: |
          set -euo pipefail

          if [ -d "dist" ]; then
            echo "dir=dist" >> "${GITHUB_OUTPUT}"
          elif [ -d "build" ]; then
            echo "dir=build" >> "${GITHUB_OUTPUT}"
          else
            echo "Error: No se encontró la carpeta de salida 'dist/' ni 'build/' tras el build."
            ls -la
            exit 1
          fi

      # 9) Generar identificador único de versión basado en timestamp (UTC).
      - name: Generate build version
        id: version
        run: |
          set -euo pipefail

          VERSION="$(date -u +'%Y-%m-%d-%H%M')"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Versión generada: ${VERSION}"

      # 10) Subir el build a una carpeta versionada en S3.
      - name: Upload build to S3 releases
        working-directory: .
        run: |
          set -euo pipefail

          OUTPUT_DIR="${{ steps.output.outputs.dir }}"
          VERSION="${{ steps.version.outputs.version }}"

          RELEASE_PATH="s3://${S3_BUCKET_NAME}/releases/${VERSION}/"
          echo "Subiendo build a: ${RELEASE_PATH}"

          # Guardar historial: la ruta /releases/{version}/ queda disponible para rollback.
          aws s3 sync "${OUTPUT_DIR}/" "${RELEASE_PATH}" --delete

      # 11) Subir también el build a la raíz del bucket (producción).
      - name: Upload build to root
        run: |
          set -euo pipefail

          OUTPUT_DIR="${{ steps.output.outputs.dir }}"

          echo "Subiendo build al root..."

          aws s3 sync "${OUTPUT_DIR}/" "s3://${S3_BUCKET_NAME}/" \
            --delete \
            --exclude "releases/"

      # 12) Invalidar cache de CloudFront para reflejar el nuevo contenido.
      - name: Invalidate CloudFront cache
        run: |
          set -euo pipefail

          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      # 13) Mostrar comandos para rollback manual inmediato (sin rebuild).
      - name: Print manual rollback command
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          echo "Rollback manual (ejemplo):"
          echo "1) Elegir una versión previa (REVISION):"
          echo "   REVISION='TU_VERSION' # ej: ${VERSION} o una versión anterior"
          echo "2) Copiar esa revisión a la raíz:"
          echo "   aws s3 sync releases/{REVISION}/ a bucket-root (incluye --delete y preserva releases/*)"
          echo "3) Invalidate CloudFront:"
          echo "   aws cloudfront create-invalidation --distribution-id \"${CLOUDFRONT_DISTRIBUTION_ID}\" --paths \"/*\""

